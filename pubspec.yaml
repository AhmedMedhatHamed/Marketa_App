name: marketa
description: "Marketa is your smart online marketplace that brings quality products, unbeatable prices, and a seamless shopping experience all in one place. Discover, shop, and enjoy — anytime, anywhere."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.10.7


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  shared_preferences: ^2.5.4
  go_router: ^17.1.0
  smooth_page_indicator: ^2.0.1
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  fluttertoast: ^9.0.0
  get_it: ^9.2.1
  iconly: ^1.0.1
  shimmer: ^3.0.0
  dynamic_height_list_view: ^0.0.2
  flutter_card_swiper: ^7.2.0
  card_swiper: ^3.0.1
  ionicons: ^0.2.2
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


flutter:


  uses-material-design: true

  assets:
     - assets/images/Users/
     - assets/images/admin/


  fonts:
     - family: Poppins
       fonts:
         - asset: assets/fonts/Poppins/Poppins-Regular.ttf
     - family: Pacifico
       fonts:
         - asset: assets/fonts/Pacifico/Pacifico-Regular.ttf
     - family: Archivo
       fonts:
         - asset: assets/fonts/Archivo_Black/ArchivoBlack-Regular.ttf
